<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>NEXUS POS — Point of Sale System</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- =================================================================================-->
<!--                      LOGIN PAGE                                                   -->
<!-- =================================================================================-->
<div id="loginPage" class="page active">

    <div class="login-bg">
        <div class="login-noise"></div>
        <div class="login-glow"></div>
    </div>

    <div class="login-wrap">
        <div class="login-card">

            <div class="login-brand">
                <div class="brand-icon"><i class="fas fa-bolt"></i></div>
                <h1 class="brand-name">NEXUS</h1>
                <p class="brand-sub">Point of Sale System</p>
            </div>

            <form id="loginForm" novalidate>

                <div class="field-group">
                    <label class="field-label">USERNAME</label>
                    <div class="field-wrap">
                        <i class="fas fa-user field-icon"></i>
                        <input type="text" id="loginUser" class="field-input" placeholder="Enter username" autocomplete="off"/>
                    </div>
                    <span class="field-error" id="userErr"></span>
                </div>

                <div class="field-group">
                    <label class="field-label">PASSWORD</label>
                    <div class="field-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="loginPass" class="field-input" placeholder="Enter password"/>
                        <button type="button" class="toggle-pass" id="togglePass"><i class="fas fa-eye"></i></button>
                    </div>
                    <span class="field-error" id="passErr"></span>
                </div>

                <div id="loginAlert" class="login-alert d-none">
                    <i class="fas fa-triangle-exclamation"></i> Invalid credentials
                </div>

                <button type="submit" class="btn-login">
                    <span>SIGN IN</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
<!--                tempory show  my username and password -->
                <p class="login-hint">Demo: <strong>admin</strong> / <strong>1234</strong></p>
            </form>
        </div>
    </div>
</div>
<!--==============================================================================-->
<!--                   app front face                                               -->
<!--==============================================================================-->
<div id="appPage" class="page">

    <!--------------------   Sidebar       ----------------------------------------->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
            <div class="brand-icon sm"><i class="fas fa-bolt"></i></div>
            <span class="sidebar-brand">NEXUS</span>
            <button class="sidebar-close d-lg-none" id="sidebarClose"><i class="fas fa-xmark"></i></button>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-section="dashboard">
                <i class="fas fa-chart-pie"></i><span>Dashboard</span>
            </button>
            <button class="nav-item" data-section="customers">
                <i class="fas fa-users"></i><span>Customers</span>
            </button>
            <button class="nav-item" data-section="items">
                <i class="fas fa-boxes-stacked"></i><span>Items</span>
            </button>
            <button class="nav-item" data-section="orders">
                <i class="fas fa-receipt"></i><span>New Order</span>
            </button>
            <button class="nav-item" data-section="history">
                <i class="fas fa-clock-rotate-left"></i><span>History</span>
            </button>
        </nav>

        <div class="sidebar-foot">
            <div class="user-pill">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <span class="user-name">Admin</span>
                    <span class="user-role">Manager</span>
                </div>
            </div>

            <button class="btn-logout" id="logoutBtn" title="Logout">
                <i class="fas fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </aside>


    <!---------------    Topbar    --------------->
    <div class="topbar">
        <button class="menu-toggle d-lg-none" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-right">
            <div class="topbar-time" id="topbarTime"></div>
            <div class="topbar-badge"><i class="fas fa-bell"></i></div>
        </div>
    </div>





</div>
